name: Deploy to Hetzner

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t scoracle:latest .

      - name: Save & Copy Image to Hetzner
        env:
          HETZNER_IP: ${{ secrets.HETZNER_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts

          docker save scoracle:latest | ssh django@$HETZNER_IP "docker load"

      - name: Deploy on Hetzner
        env:
          HETZNER_IP: ${{ secrets.HETZNER_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          ssh django@$HETZNER_IP "
            docker stop scoracle || true
            docker rm scoracle || true
            docker run -d \
              --name scoracle \
              --restart always \
              -p 8000:8000 \
              --env-file /home/django/.env \
              scoracle:latest
          "