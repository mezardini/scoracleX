name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts
          # Debug: show fingerprint of key being used
          ssh-keygen -l -f ~/.ssh/id_rsa

      - name: Build Docker Image
        run: docker build -t scoracle:latest .

      - name: Copy Image to Hetzner
        run: |
          docker save scoracle:latest | ssh -i ~/.ssh/id_rsa -v django@${{ secrets.HETZNER_IP }} "docker load"

      - name: Deploy on Hetzner
        run: |
          ssh -i ~/.ssh/id_rsa django@${{ secrets.HETZNER_IP }} "
            docker stop scoracle || true
            docker rm scoracle || true
            docker run -d \
              --name scoracle \
              --restart always \
              -p 8000:8000 \
              --env-file /home/django/.env \
              scoracle:latest
          "
