<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found - Scoracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #e8f4fb;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a { color: inherit; text-decoration: none; }
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 500;
        }
        .brand-icon {
            width: 32px;
            height: 32px;
            background: #1a1a1a;
            color: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        main {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 2rem 1rem 4rem;
        }
        .error-panel {
            width: min(520px, 100%);
            background: #fff;
            border: 0.5px solid rgba(0, 0, 0, 0.12);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
        }
        .error-code {
            display: inline-block;
            background: #b9f54d;
            border-radius: 10px;
            padding: 4px 14px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 600;
            line-height: 1.15;
            margin-bottom: 0.75rem;
        }
        p {
            color: #777;
            font-size: 15px;
            line-height: 1.6;
            margin: 0 auto 1.5rem;
            max-width: 420px;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            background: #1a1a1a;
            color: #fff;
            border-radius: 8px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">
            <span class="brand-icon">S</span>
            Scoracle
        </a>
    </nav>
    <main>
        <section class="error-panel">
            <span class="error-code">404</span>
            <h1>That match page is missing.</h1>
            <p>The page may have moved, expired, or never existed. The latest predictions are still waiting on the homepage.</p>
            <a href="{% url 'home' %}" class="btn-home">Back to predictions</a>
        </section>
    </main>
</body>

</html>
