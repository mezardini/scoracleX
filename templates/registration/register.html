<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create account - Palmer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #e8f4fb;
            color: #1a1a1a;
            min-height: 100vh;
        }
        a { color: inherit; text-decoration: none; }
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 500;
        }
        .brand-icon {
            width: 32px;
            height: 32px;
            background: #1a1a1a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .auth-shell {
            width: min(480px, calc(100% - 32px));
            margin: 2rem auto 3rem;
            background: #fff;
            border: 0.5px solid rgba(0, 0, 0, 0.12);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
        }
        .auth-eyebrow {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 0.75rem;
        }
        h1 {
            font-size: 30px;
            line-height: 1.12;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .auth-sub {
            color: #777;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 1.4rem;
        }
        .google-btn,
        .submit-btn {
            width: 100%;
            min-height: 44px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .google-btn {
            background: #fff;
            color: #3c4043;
            border: 1px solid #dadce0;
            margin-bottom: 1rem;
            box-shadow: 0 1px 2px rgba(60, 64, 67, 0.08);
            transition: background 0.15s ease, box-shadow 0.15s ease;
        }
        .google-btn:hover {
            background: #f8fbff;
            box-shadow: 0 2px 6px rgba(66, 133, 244, 0.18);
        }
        .google-icon {
            width: 18px;
            height: 18px;
            flex: 0 0 18px;
        }
        .submit-btn {
            background: #b9f54d;
            color: #1a1a1a;
            margin-top: 0.4rem;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #999;
            font-size: 12px;
            margin: 1rem 0;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e5e5;
        }
        .name-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .field { margin-bottom: 0.85rem; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            border: 0.5px solid rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            padding: 11px 12px;
            font: inherit;
            outline: none;
        }
        input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .errorlist {
            list-style: none;
            color: #dc2626;
            font-size: 12px;
            line-height: 1.5;
            margin: 6px 0 0;
        }
        .auth-switch {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-top: 1rem;
        }
        .auth-switch a { color: #4f46e5; font-weight: 600; }
        @media (max-width: 560px) {
            .name-grid { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">
            <span class="brand-icon">S</span>
            Palmer
        </a>
    </nav>

    <main class="auth-shell">
        <p class="auth-eyebrow">Create account</p>
        <h1>See the full prediction board.</h1>
        <p class="auth-sub">Create a Palmer account with Google, or register with your email and password.</p>

        <a class="google-btn" href="{% url 'social:begin' 'google-oauth2' %}">
            <svg class="google-icon" viewBox="0 0 18 18" aria-hidden="true">
                <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.26-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z" />
                <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.33-1.58-5.04-3.71H.94v2.33A9 9 0 0 0 9 18z" />
                <path fill="#FBBC05" d="M3.96 10.71A5.41 5.41 0 0 1 3.68 9c0-.59.1-1.16.28-1.71V4.96H.94A9 9 0 0 0 0 9c0 1.45.34 2.82.94 4.04l3.02-2.33z" />
                <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.9 11.42 0 9 0A9 9 0 0 0 .94 4.96l3.02 2.33C4.67 5.16 6.66 3.58 9 3.58z" />
            </svg>
            Continue with Google
        </a>

        <p class="auth-switch">Already registered? <a href="{% url 'login' %}">Sign in</a></p>
    </main>
</body>

</html>
